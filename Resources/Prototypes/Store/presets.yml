- type: entity
  id: StorePresetUplink
  abstract: true
  components:
  - type: Store
    name: store-preset-name-uplink
    categories:
    - UplinkWeaponry
    - UplinkAmmo
    - UplinkAttachments #ADT_Tweak
    - UplinkExplosives
    - UplinkChemicals
    - UplinkDeception
    - UplinkDisruption
    - UplinkImplants
    - UplinkAllies
    - UplinkWearables
    - UplinkJob
    - UplinkSilicon
    - UplinkPointless
    - UplinkObjective
    currencyWhitelist:
    - Telecrystal
    balance:
      Telecrystal: 0
    expectedFaction:
    - Syndicate

- type: entity
  id: StorePresetSpellbook
  abstract: true
  components:
  - type: Store
    name: store-preset-name-spellbook
    categories:
    - SpellbookOffensive    #Fireball, Rod Form
    - SpellbookDefensive    #Magic Missile, Wall of Force
    - SpellbookUtility      #Body Swap, Lich, Teleport, Knock, Polymorph
    - SpellbookEquipment    #Battlemage Robes, Staff of Locker
    #ADT-Tweak-Start
    # Слишком много случаев, когда ивентеры ненамеренно выдавали всей станции ПУШКИ.
    # Раскомментить только если вы знаете ЧТО ДЕЛАЕТЕ.
    #- SpellbookEvents       #Summon Weapons, Summon Ghosts
    #ADT-Tweak-End
    currencyWhitelist:
    - WizCoin
    expectedFaction:
    - Wizard

