    sprite: ADT/Objects/Specific/syndieshoes_voucher.rsi
    state: syndie_shoebox
  - type: Item
    size: Normal
  - type: ActivatableUI
    key: enum.MiningVoucherUiKey.Key
  - type: UserInterface
    interfaces:
      enum.MiningVoucherUiKey.Key:
        type: MiningVoucherBoundUserInterface
